name: Publish Generated Packages

permissions: {}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bootstrap_new_packages:
        description: >-
          If true, first publish any schema packages that have never existed on npm
          before (npm stage publish cannot create a package for the first time).
          Existing packages with just a pending new version are left to the normal
          staged-publish step below. No credentials are configured for this step, so
          npm will print a login URL in this log; open it on your phone and approve
          with 2FA to let each publish continue.
        required: false
        type: boolean
        default: false

jobs:
  publish_generated_packages:
    permissions:
      id-token: write
      contents: write
      pull-requests: write
    name: Publish generated packages
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore(schemas): weekly schema update'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26
          cache: yarn

      - name: Ensure npm supports staged publishing
        run: |
          npm install -g npm@latest
          npm --version

      - name: Install dependencies
        run: yarn --immutable

      - name: Bootstrap brand-new packages via npm browser login
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_new_packages == true
        timeout-minutes: 15
        run: yarn bootstrap:new-packages

      - name: Publish generated packages
        id: publish
        continue-on-error: true
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          yarn publish:schemas

      - name: Compose PR body
        if: always()
        run: |
          {
            echo "Update published flags in \`schema-lock.json\` after npm publish attempts."
            echo ""
            echo "This PR is created by the publish workflow."
            if [ -f publish-summary.md ]; then
              echo ""
              cat publish-summary.md
            fi
          } > pr-body.md

      - name: Create Pull Request for updated schema lock
        if: always()
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          author: Florian Imdahl <git@ffflorian.de>
          committer: Florian Imdahl <git@ffflorian.de>
          add-paths: schema-lock.json
          base: ${{ github.event.repository.default_branch }}
          branch: chore/schema-lock-published-flags
          delete-branch: true
          commit-message: 'chore(schema-lock): update published flags'
          title: 'chore(schema-lock): update published flags'
          body-path: pr-body.md

      - name: Fail workflow when publishing failed
        if: steps.publish.outcome == 'failure'
        run: exit 1

      - name: Upload publish log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-errors-log
          path: publish-errors.log
          if-no-files-found: ignore
