name: Publish Generated Packages

permissions:
  id-token: write
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish_generated_packages:
    name: Publish generated packages
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && startsWith(github.event.head_commit.message, 'chore(schemas): weekly schema update'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.x
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn --immutable

      - name: Publish generated packages
        id: publish
        continue-on-error: true
        run: |
          yarn publish:schemas

      - name: Compose PR body
        if: always()
        run: |
          {
            echo "Update published flags in \`schema-lock.json\` after npm publish attempts."
            echo ""
            echo "This PR is created by the publish workflow."
            if [ -f publish-summary.md ]; then
              echo ""
              cat publish-summary.md
            fi
          } > pr-body.md

      - name: Create Pull Request for updated schema lock
        if: always()
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          author: Florian Imdahl <git@ffflorian.de>
          committer: Florian Imdahl <git@ffflorian.de>
          add-paths: schema-lock.json
          base: ${{ github.event.repository.default_branch }}
          branch: chore/schema-lock-published-flags
          delete-branch: true
          commit-message: 'chore(schema-lock): update published flags'
          title: 'chore(schema-lock): update published flags'
          body-path: pr-body.md

      - name: Fail workflow when publishing failed
        if: steps.publish.outcome == 'failure'
        run: exit 1

      - name: Upload publish log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: publish-errors-log
          path: publish-errors.log
          if-no-files-found: ignore
