name: Publish Generated Packages

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]

jobs:
  publish_generated_packages:
    name: Publish generated packages
    if: |
      github.event_name == 'push' && github.ref == 'refs/heads/main' && github.event.head_commit.message == 'chore(schemas): weekly schema update'
    needs: lint_test_build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24.x
          cache: yarn
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn --immutable

      - name: Publish generated packages
        id: publish
        continue-on-error: true
        run: yarn publish:schemas
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Pull Request for updated schema lock
        if: always()
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          author: Florian Imdahl <git@ffflorian.de>
          committer: Florian Imdahl <git@ffflorian.de>
          add-paths: schema-lock.json
          base: ${{ github.event.repository.default_branch }}
          branch: chore/schema-lock-published-flags
          delete-branch: true
          commit-message: 'chore(schema-lock): update published flags'
          title: 'chore(schema-lock): update published flags'
          body: |
            Update published flags in `schema-lock.json` after npm publish attempts.

            This PR is created by the publish workflow.

      - name: Fail workflow when publishing failed
        if: steps.publish.outcome == 'failure'
        run: exit 1

      - name: Upload publish log
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: publish-errors-log
          path: publish-errors.log
          if-no-files-found: ignore
