name: Force Regenerate All Schemas


on:
  workflow_dispatch:

jobs:
  force-regenerate:
    name: Force regenerate all schema packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Force regenerate all schema packages
        id: update
        continue-on-error: true
        run: yarn update --force

      - name: Validate generated output
        run: |
          yarn check
          yarn test

      - name: Compose PR body
        if: always()
        run: |
          {
            echo "Full schema regeneration triggered manually via the **Force Regenerate All Schemas** workflow."
            echo ""
            echo "This PR was created after running:"
            echo ""
            echo "- \`yarn update --force\`"
            echo "- \`yarn check\`"
            echo "- \`yarn test\`"
            if [ -f update-summary.md ]; then
              echo ""
              cat update-summary.md
            fi
          } > pr-body.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          author: Florian Imdahl <git@ffflorian.de>
          committer: Florian Imdahl <git@ffflorian.de>
          base: ${{ github.event.repository.default_branch }}
          branch: chore/force-regenerate-schemas
          delete-branch: true
          commit-message: 'chore(schemas): force regenerate all schemas'
          title: 'chore(schemas): force regenerate all schemas'
          body-path: pr-body.md

      - name: Fail workflow when regeneration failed
        if: steps.update.outcome == 'failure'
        run: exit 1

      - name: Upload update log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: schemagenerator-log
          path: schemagenerator.log
          if-no-files-found: ignore
