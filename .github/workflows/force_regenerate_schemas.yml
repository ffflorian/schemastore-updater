name: Force Regenerate All Schemas

permissions: {}

on:
  workflow_dispatch:

jobs:
  force-regenerate:
    permissions:
      contents: write
      pull-requests: write
    name: Force regenerate all schema packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 26
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Force regenerate all schema packages
        id: update
        continue-on-error: true
        run: yarn update --force

      - name: Validate generated output
        run: |
          yarn check
          yarn test

      - name: Compose PR body
        if: always()
        run: |
          {
            echo "Full schema regeneration triggered manually via the **Force Regenerate All Schemas** workflow."
            echo ""
            echo "This PR was created after running:"
            echo ""
            echo "- \`yarn update --force\`"
            echo "- \`yarn check\`"
            echo "- \`yarn test\`"
            if [ -f update-summary.md ]; then
              echo ""
              cat update-summary.md
            fi
          } > pr-body.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1
        with:
          author: Florian Imdahl <git@ffflorian.de>
          committer: Florian Imdahl <git@ffflorian.de>
          base: ${{ github.event.repository.default_branch }}
          branch: chore/force-regenerate-schemas
          delete-branch: true
          commit-message: 'chore(schemas): force regenerate all schemas'
          title: 'chore(schemas): force regenerate all schemas'
          body-path: pr-body.md

      - name: Fail workflow when regeneration failed
        if: steps.update.outcome == 'failure'
        run: exit 1

      - name: Upload update log
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: schemagenerator-log
          path: schemagenerator.log
          if-no-files-found: ignore
