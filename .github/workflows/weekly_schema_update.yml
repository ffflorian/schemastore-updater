name: Weekly Schema Update

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 5 * * 1' # Every Monday at 05:00 AM UTC
  workflow_dispatch:

jobs:
  update-schemas:
    name: Update generated schema packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Update schema packages
        id: update
        continue-on-error: true
        run: yarn update

      - name: Validate generated output
        run: |
          yarn check
          yarn test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          author: Florian Imdahl <git@ffflorian.de>
          committer: Florian Imdahl <git@ffflorian.de>
          base: ${{ github.event.repository.default_branch }}
          branch: chore/weekly-schema-update
          commit-message: 'chore(schemas): weekly schema update'
          title: 'chore(schemas): weekly schema update'
          body: |
            Weekly automated schema refresh.

            This PR was created by the scheduled workflow after running:

            - `yarn update`
            - `yarn check`
            - `yarn test`

      - name: Fail workflow when publishing failed
        if: steps.update.outcome == 'failure'
        run: exit 1

      - name: Upload update log
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: schemagenerator-log
          path: schemagenerator.log
          if-no-files-found: ignore
