name: Weekly Schema Update

permissions:
  contents: write
  pull-requests: write

on:
  schedule:
    - cron: '0 5 * * 1' # Every Monday at 5:00 AM UTC
  workflow_dispatch:

jobs:
  update-schemas:
    name: Update generated schema packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238
        with:
          node-version: 24.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Update schema packages
        run: yarn update

      - name: Validate generated output
        run: |
          yarn check
          yarn test

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0
        with:
          author: Florian Imdahl <git@ffflorian.de>
          committer: Florian Imdahl <git@ffflorian.de>
          base: ${{ github.event.repository.default_branch }}
          branch: chore/weekly-schema-update
          commit-message: 'chore(schemas): weekly schema update'
          title: 'chore(schemas): weekly schema update'
          body: |
            Weekly automated schema refresh.

            This PR was created by the scheduled workflow after running:

            - `yarn update`
            - `yarn check`
            - `yarn test`
