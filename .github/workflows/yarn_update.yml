name: Check for yarn updates

permissions: {}

on:
  schedule:
    - cron: '0 5 1 * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/yarn_update.yml'
  workflow_dispatch:

jobs:
  yarn-update-check:
    name: Yarn update check
    permissions:
      contents: write
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Update yarn
        uses: ffflorian/actions/yarn-update@0306941fc8c1a71a8bdaa1a2253e37f6ae707c6d
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          git_authorship: 'Florian Imdahl <git@ffflorian.de>'
          release_cooldown_days: '5'
          assignees: 'ffflorian'
